<!DOCTYPE html>
<html lang="tr" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Management Hub</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --sidebar-width: 280px;
            --sidebar-collapsed-width: 90px;
            --transition-speed: 0.5s;
            /* Akıcı ama 3D olmayan yaylanma eğrisi */
            --ease-elastic: cubic-bezier(0.68, -0.55, 0.265, 1.55);
            
            /* AÇIK TEMA */
            --sidebar-bg: #ffffff;
            --main-bg: #f4f7fe;
            --accent-orange: #ff6b00;
            --nav-text: #64748b;
            --border-color: rgba(0,0,0,0.05);
        }

        /* KOYU TEMA */
        [data-bs-theme="dark"] {
            --sidebar-bg: #000000;
            --main-bg: #080808;
            --accent-orange: #ff7a1a;
            --nav-text: #888888;
            --border-color: rgba(255, 122, 26, 0.15);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--main-bg);
            margin: 0;
            display: flex;
            overflow: hidden;
            transition: background 0.3s ease;
        }

        /* SIDEBAR */
        #sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: width var(--ease-elastic);
            position: fixed;
            left: 0;
            top: 0;
            z-index: 1050;
        }

        #sidebar.collapsed {
            width: var(--sidebar-collapsed-width);
        }

        /* HEADER */
        .sidebar-header {
            padding: 30px 25px;
            cursor: pointer;
            user-select: none;
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--accent-orange);
            font-weight: 800;
            font-size: 1.4rem;
            letter-spacing: 0.5px;
        }

        /* MENU */
        .nav-menu {
            padding: 0 15px;
            flex-grow: 1;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 14px 18px;
            color: var(--nav-text);
            text-decoration: none;
            border-radius: 15px;
            margin-bottom: 8px;
            transition: all 0.3s ease;
            white-space: nowrap;
            overflow: hidden;
        }

        .nav-link:hover {
            color: var(--accent-orange);
            background: rgba(255, 107, 0, 0.08);
            transform: translateX(10px); /* Sadece yana kayma */
        }

        .nav-link.active {
            color: #ffffff;
            background: var(--accent-orange);
            font-weight: 700;
            box-shadow: 0 8px 15px rgba(255, 107, 0, 0.2);
        }

        /* Yazı Gizleme Animasyonu */
        .nav-link span, .brand-logo span {
            transition: opacity 0.2s ease;
        }

        #sidebar.collapsed .nav-link span,
        #sidebar.collapsed .brand-logo span,
        #sidebar.collapsed .nav-menu small,
        #sidebar.collapsed .theme-switch span {
            opacity: 0;
            display: none;
        }

        /* MAIN CONTENT */
        #main-content {
            flex-grow: 1;
            height: 100vh;
            margin-left: var(--sidebar-width);
            transition: margin-left var(--ease-elastic);
            display: flex;
            flex-direction: column;
        }

        #main-content.expanded {
            margin-left: var(--sidebar-collapsed-width);
        }

        .top-bar {
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .view-container {
            flex-grow: 1;
            padding: 0 20px 20px 20px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 25px;
            background: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: opacity 0.3s ease;
        }

        /* FOOTER */
        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid var(--border-color);
        }

        .theme-switch {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            padding: 10px;
            color: var(--nav-text);
            border-radius: 12px;
            transition: 0.3s;
        }

        .theme-switch:hover {
            background: rgba(255, 107, 0, 0.05);
            color: var(--accent-orange);
        }

        @media (max-width: 992px) {
            #sidebar { left: -100%; }
            #sidebar.mobile-open { left: 0; width: 280px !important; }
            #main-content { margin-left: 0 !important; }
        }
    </style>
</head>
<body>

    <aside id="sidebar">
        <div class="sidebar-header" onclick="toggleSidebar()">
            <div class="brand-logo">
                <i data-lucide="layout-grid" size="30"></i>
                <span>FORM HUB</span>
            </div>
        </div>

        <div class="nav-menu">
            <small class="text-muted d-block mb-3 ps-3" style="font-size: 0.6rem; letter-spacing: 2px;">DOKÜMANLAR</small>
            
            <a href="javascript:void(0)" class="nav-link active" onclick="loadForm('musteri-kayit.html', this)">
                <i data-lucide="user-plus"></i>
                <span>Müşteri Kayıt</span>
            </a>
            
            <a href="javascript:void(0)" class="nav-link" onclick="loadForm('mietvertrag.html', this)">
                <i data-lucide="file-text"></i>
                <span>Mietvertrag</span>
            </a>

            <a href="javascript:void(0)" class="nav-link" onclick="loadForm('beyond-form.html', this)">
                <i data-lucide="zap"></i>
                <span>Beyond</span>
            </a>

            <a href="javascript:void(0)" class="nav-link" onclick="loadForm('checklist.html', this)">
                <i data-lucide="check-square"></i>
                <span>Checklist</span>
            </a>
        </div>

        <div class="sidebar-footer">
            <div class="theme-switch" onclick="toggleTheme()">
                <i data-lucide="moon" id="theme-icon"></i>
                <span>Tema Değiştir</span>
            </div>
        </div>
    </aside>

    <main id="main-content">
        <div class="top-bar">
            <button class="btn btn-outline-warning d-lg-none" onclick="toggleMobileSidebar()">
                <i data-lucide="menu"></i>
            </button>
            
            <h5 class="fw-bold mb-0" id="page-title">Müşteri Kayıt</h5>
            
            <div class="user-info d-flex align-items-center gap-3">
                <div class="text-end d-none d-sm-block">
                    <div class="fw-bold small">Admin</div>
                    <div class="text-warning" style="font-size: 0.6rem;">SİSTEM YÖNETİCİSİ</div>
                </div>
                <div class="bg-dark text-warning rounded-circle d-flex align-items-center justify-content-center border border-warning shadow-sm" style="width: 40px; height: 40px;">
                    <i data-lucide="shield-check" size="20"></i>
                </div>
            </div>
        </div>

        <div class="view-container">
            <iframe src="musteri-kayit.html" id="content-frame"></iframe>
        </div>
    </main>

    <script>
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('main-content');
        const iframe = document.getElementById('content-frame');
        const pageTitle = document.getElementById('page-title');

        function toggleSidebar() {
            sidebar.classList.toggle('collapsed');
            mainContent.classList.toggle('expanded');
            setTimeout(() => lucide.createIcons(), 300);
        }

        function toggleMobileSidebar() {
            sidebar.classList.toggle('mobile-open');
        }

        function loadForm(url, element) {
            iframe.style.opacity = '0';
            setTimeout(() => {
                iframe.src = url;
                iframe.style.opacity = '1';
            }, 250);
            
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            element.classList.add('active');
            pageTitle.innerText = element.querySelector('span').innerText;

            if (window.innerWidth < 992) sidebar.classList.remove('mobile-open');
        }

        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-bs-theme');
            const target = current === 'light' ? 'dark' : 'light';
            html.setAttribute('data-bs-theme', target);
            
            const icon = document.getElementById('theme-icon');
            icon.setAttribute('data-lucide', target === 'light' ? 'moon' : 'sun');
            lucide.createIcons();
        }

        window.onload = () => lucide.createIcons();
    </script>
</body>
</html>
