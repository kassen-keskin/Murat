<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rental Safe Monitor</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --card-bg: #2d2d2d;
            --primary-color: #bb86fc;
            --secondary-color: #03dac6;
            --text-color: #e0e0e0;
            --text-muted: #a0a0a0;
            --border-color: #333;
            --hover-color: #3d3d3d;
            --modal-bg: #252525;
            --modal-overlay: rgba(0, 0, 0, 0.8);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        .dashboard-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .panel {
            background-color: var(--surface-color);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background: transparent;
        }

        .list-panel {
            flex: 1;
        }

        .panel-header {
            display: none;
        }

        .card-container {
            overflow-y: auto;
            flex: 1;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 20px;
            padding: 10px;
            align-content: start;
        }

        /* The Grid Item Anchor - Defines the space in the grid */
        .card-placeholder {
            position: relative;
            min-height: 180px;
            /* Fixed height for the grid slots */
            z-index: 1;
        }

        /* The Visual Card - Floats inside the anchor */
        .customer-card {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            /* Default state: stick to the placeholder height */
            height: 100%;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 20px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow: hidden;
            /* Hide overflow by default */
            transition: all 0.2s ease-in-out;
            box-sizing: border-box;
        }

        /* Service Customer Green Styling */
        .customer-card.service-kunde {
            background-color: rgba(27, 94, 32, 0.4);
            /* Dark Green tint */
            border-color: #4caf50;
        }

        .customer-card.service-kunde:hover {
            background-color: rgba(27, 94, 32, 0.8);
            border-color: #81c784;
            box-shadow: 0 10px 30px rgba(0, 50, 0, 0.8);
        }

        .customer-card.service-kunde .card-title {
            color: #a5d6a7;
            /* Lighter green for text */
            border-bottom-color: #66bb6a;
        }

        /* Hover State - Expansion */
        .card-placeholder:hover {
            z-index: 1000;
            /* Bring to front */
        }

        .card-placeholder:hover .customer-card {
            height: auto;
            /* Expand to fit content */
            min-height: 100%;
            background-color: var(--hover-color);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            /* Strong shadow to separate */
            border-color: var(--primary-color);
            transform: scale(1.02);
            /* Slight pop */
        }

        /* Specific hover for service kunde to override generic hover */
        .card-placeholder:hover .customer-card.service-kunde {
            background-color: rgba(27, 94, 32, 0.95);
            border-color: #81c784;
        }

        .card-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 4px;
            margin-bottom: 4px;
            flex-shrink: 0;
            /* Prevent squishing */
        }

        .card-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 10px;
            white-space: normal;
            line-height: 1.3;
            border-bottom: 2px solid var(--secondary-color);
            padding-bottom: 8px;
        }

        .card-info {
            font-size: 0.95rem;
            color: var(--text-muted);
            min-width: 80px;
        }

        .card-value {
            font-size: 1.05rem;
            color: var(--text-color);
            font-weight: 500;
            white-space: normal;
            text-align: right;
            /* No overflow hiding here, wrapped text will show on expansion */
        }

        /* Modal Styling */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--modal-overlay);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background-color: var(--modal-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            width: 70%;
            max-width: 800px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7);
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-header {
            padding: 20px 25px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.03);
        }

        .modal-title {
            font-size: 1.5rem;
            color: var(--primary-color);
            font-weight: 600;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 2rem;
            cursor: pointer;
            line-height: 1;
            padding: 0;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: #fff;
        }

        .modal-body {
            padding: 30px;
            overflow-y: auto;
            font-size: 1.2rem;
            line-height: 1.6;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }

        ::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #666;
        }

        .empty-state {
            padding: 40px;
            text-align: center;
            color: var(--text-muted);
            grid-column: 1 / -1;
            font-size: 1.2rem;
        }

        /* Responsive adjustments */
        @media (max-width: 1600px) {
            .card-container {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (max-width: 1200px) {
            .card-container {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 900px) {
            .card-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .card-container {
                grid-template-columns: 1fr;
            }
        }

        .filter-panel {
            background-color: var(--surface-color);
            border-radius: 8px;
            padding: 8px 15px;
            /* Reduced vertical padding */
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: nowrap;
            overflow-x: auto;
            flex-shrink: 0;
            flex-direction: row;
            /* FORCE ROW */
        }

        .filter-group {
            display: flex;
            flex-direction: row;
            /* Horizontal: Label -> Input */
            align-items: center;
            /* Center vertically */
            gap: 10px;
            flex: 0 0 auto;
            /* Don't stretch */
        }

        .filter-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 600;
            white-space: nowrap;
            /* Keep label on one line */
        }

        .filter-input,
        .filter-select {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 6px 10px;
            /* Smaller input padding */
            color: var(--text-color);
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
            width: 180px;
            /* Fixed width for consistency */
        }
    </style>
</head>

<body>

    <div class="dashboard-container">

        <!-- Filter Panel -->
        <div class="panel filter-panel">

            <div class="filter-group">
                <label class="filter-label">KundenNr</label>
                <input type="text" id="filterKundenNr" class="filter-input" placeholder="Type to filter...">
            </div>

            <div class="filter-group">
                <label class="filter-label">KundenKategorie</label>
                <select id="filterKundenKategorie" class="filter-select">
                    <option value="">All</option>
                </select>
            </div>
        </div>

        <!-- Customer List Container -->
        <div class="panel list-panel">
            <div id="cardContainer" class="card-container">
                <!-- Cards will be populated dynamically -->
            </div>
        </div>
    </div>

    <!-- Modal Structure -->
    <div id="detailModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Customer Details</div>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalBody" class="modal-body">
                Loading...
            </div>
        </div>
    </div>

    <script>
        let refreshInterval;
        const REFRESH_RATE = 60000; // 60 seconds
        const modal = document.getElementById('detailModal');
        const modalBody = document.getElementById('modalBody');

        // Global Data Store
        let allCustomers = [];

        // Fetch Data
        async function fetchCustomers() {
            try {
                const response = await fetch('/api/customers');
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();

                // Update global data only if changed (simple check or just overwrite)
                // For now, overwrite
                allCustomers = data;

                // Initialize Filters if first load or update options?
                // We typically populate dropdowns on first load or refresh them.
                // Let's populate filter options based on current data
                populateFilterOptions();

                // Apply current filters to render
                applyFilters();

            } catch (error) {
                console.error('Error fetching customers:', error);
            }
        }

        async function fetchDetails(id) {
            modalBody.innerHTML = "Loading...";
            try {
                const response = await fetch(`/api/details/${id}`);
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                renderDetailsInModal(data);
            } catch (error) {
                console.error('Error fetching details:', error);
                modalBody.innerHTML = "Error loading details";
            }
        }

        function renderDetailsInModal(data) {
            if (data.error) {
                modalBody.innerHTML = data.error;
                return;
            }

            if (!Array.isArray(data) || data.length === 0) {
                modalBody.innerHTML = "No details found";
                return;
            }

            let combinedHtml = '';
            data.forEach((record) => {
                if (record.Detay) {
                    combinedHtml += record.Detay + '<br><hr style="border-color:rgba(255,255,255,0.1); margin:15px 0;">';
                } else {
                    const parts = [];
                    for (const [key, value] of Object.entries(record)) {
                        if (key !== 'kKunde') parts.push(`<strong>${key}:</strong> ${value}`);
                    }
                    combinedHtml += parts.join(' | ') + '<br><hr style="border-color:rgba(255,255,255,0.1); margin:15px 0;">';
                }
            });
            modalBody.innerHTML = combinedHtml;
        }

        // Modal Logic
        function openModal(customerId, customerName) {
            modal.style.display = 'flex';
            document.querySelector('.modal-title').textContent = `${customerName || 'Müşteri'} Detay`;
            fetchDetails(customerId);
        }

        window.closeModal = function () {
            modal.style.display = 'none';
        }

        window.onclick = function (event) {
            if (event.target == modal) {
                closeModal();
            }
        }

        // Filter Logic
        const filterKundenNr = document.getElementById('filterKundenNr');


        const filterKundenKategorie = document.getElementById('filterKundenKategorie');

        function populateFilterOptions() {
            // Helper to populate select
            const populate = (selectId, key) => {
                const select = document.getElementById(selectId);
                const currentVal = select.value;
                const uniqueValues = [...new Set(allCustomers.map(c => c[key]).filter(v => v))].sort();

                // clear options, keep first (All)
                select.innerHTML = '<option value="">All</option>';

                uniqueValues.forEach(val => {
                    const opt = document.createElement('option');
                    opt.value = val;
                    opt.textContent = val;
                    select.appendChild(opt);
                });

                // Restore selection if possible
                if (uniqueValues.includes(currentVal)) {
                    select.value = currentVal;
                }
            };

            // Only repopulate effectively if we want dynamic updates of filters
            // For stability, maybe check if empty? But refreshing might bring new categories.
            // Let's repopulate.

            populate('filterKundenKategorie', 'KundenKategorie');
        }

        function applyFilters() {
            const kundenNrVal = filterKundenNr.value.trim().toLowerCase();


            const kundenKategorieVal = filterKundenKategorie.value;

            const filtered = allCustomers.filter(row => {
                // Check KundenNr (Edit - contains)
                const nr = row['KundenNr'] ? String(row['KundenNr']).toLowerCase() : '';
                if (kundenNrVal && !nr.includes(kundenNrVal)) return false;





                // Check KundenKategorie (Combobox - exact match)
                if (kundenKategorieVal && row['KundenKategorie'] != kundenKategorieVal) return false;

                return true;
            });

            renderCards(filtered);
        }

        // Filter Events
        filterKundenNr.addEventListener('input', applyFilters);


        filterKundenKategorie.addEventListener('change', applyFilters);


        // Render Functions
        function renderCards(data) {
            const container = document.getElementById('cardContainer');
            container.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = '<div class="empty-state">No customers found</div>';
                return;
            }

            // Heuristic to find Title Key
            const sample = data[0];
            const keys = Object.keys(sample).filter(k => k !== 'kKunde');
            let titleKey = keys.find(k => /ad|name|firma|unvan|customer/i.test(k));
            if (!titleKey && keys.length > 0) titleKey = keys[0];

            data.forEach(row => {
                // Wrapper anchor
                const wrapper = document.createElement('div');
                wrapper.className = 'card-placeholder';

                // Visual card
                const card = document.createElement('div');
                card.className = 'customer-card';

                // Conditional Styling for Servicekunde
                if (row['KundenGruppe'] === 'Servicekunde') {
                    card.classList.add('service-kunde');
                }

                // Pass the title value to openModal
                // Format: [KundenNr] - [Firma]
                const firmaName = row[titleKey] || '(No Name)';
                const kundenNr = row['KundenNr'] || '';
                const displayTitle = kundenNr ? `${kundenNr} - ${firmaName}` : firmaName;

                card.onclick = () => openModal(row.kKunde, displayTitle);

                // Render Title
                if (titleKey) {
                    const title = document.createElement('div');
                    title.className = 'card-title';
                    title.textContent = displayTitle;
                    title.title = displayTitle;
                    card.appendChild(title);
                }

                // Render Other Fields
                const infoContainer = document.createElement('div');
                infoContainer.style.display = 'flex';
                infoContainer.style.flexDirection = 'column';
                infoContainer.style.gap = '4px';

                keys.forEach(key => {
                    if (key === titleKey) return;

                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'card-row';

                    const label = document.createElement('span');
                    label.className = 'card-info';
                    label.textContent = key;

                    const val = document.createElement('span');
                    val.className = 'card-value';
                    const value = row[key] !== null ? row[key] : '-';
                    val.textContent = value;
                    // val.title = value; 

                    rowDiv.appendChild(label);
                    rowDiv.appendChild(val);
                    infoContainer.appendChild(rowDiv);
                });
                card.appendChild(infoContainer);

                wrapper.appendChild(card);
                container.appendChild(wrapper);
            });
        }

        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(fetchCustomers, REFRESH_RATE);
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchCustomers();
            startAutoRefresh();
        });
    </script>
</body>

</html>
