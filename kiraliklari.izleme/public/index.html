<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rental Safe Monitor</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --card-bg: #2d2d2d;
            --primary-color: #bb86fc;
            --secondary-color: #03dac6;
            --text-color: #e0e0e0;
            --text-muted: #a0a0a0;
            --border-color: #333;
            --hover-color: #3d3d3d;
            --modal-bg: #252525;
            --modal-overlay: rgba(0, 0, 0, 0.8);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        .dashboard-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .panel {
            background-color: var(--surface-color);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background: transparent;
        }

        .list-panel {
            flex: 1;
        }

        .panel-header {
            display: none;
        }

        .card-container-wrapper {
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }

        .card-container {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 20px;
            align-content: start;
        }

        /* The Grid Item Anchor - Defines the space in the grid */
        .card-placeholder {
            position: relative;
            min-height: 180px;
            /* Fixed height for the grid slots */
            z-index: 1;
        }

        /* The Visual Card - Floats inside the anchor */
        .customer-card {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            /* Default state: stick to the placeholder height */
            height: 100%;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 20px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow: hidden;
            /* Hide overflow by default */
            transition: all 0.2s ease-in-out;
            box-sizing: border-box;
        }

        /* Service Customer Green Styling */
        .customer-card.service-kunde {
            background-color: rgba(27, 94, 32, 0.4);
            /* Dark Green tint */
            border-color: #4caf50;
        }

        .customer-card.service-kunde:hover {
            background-color: rgba(27, 94, 32, 0.8);
            border-color: #81c784;
            box-shadow: 0 10px 30px rgba(0, 50, 0, 0.8);
        }

        .customer-card.service-kunde .card-title {
            color: #a5d6a7;
            /* Lighter green for text */
            border-bottom-color: #66bb6a;
        }

        /* Hover State - Expansion */
        .card-placeholder:hover {
            z-index: 1000;
            /* Bring to front */
        }

        .card-placeholder:hover .customer-card {
            height: auto;
            /* Expand to fit content */
            min-height: 100%;
            background-color: var(--hover-color);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            /* Strong shadow to separate */
            border-color: var(--primary-color);
            transform: scale(1.02);
            /* Slight pop */
        }

        /* Specific hover for service kunde to override generic hover */
        .card-placeholder:hover .customer-card.service-kunde {
            background-color: rgba(27, 94, 32, 0.95);
            border-color: #81c784;
        }

        /* Debt Styling */
        .customer-card.has-debt {
            border-color: #ef5350;
        }

        .customer-card.has-debt .card-title,
        .customer-card.has-debt .card-info,
        .customer-card.has-debt .card-value {
            color: #ef5350;
        }

        .customer-card.has-debt .card-title {
            border-bottom-color: #ef5350;
        }

        .card-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 4px;
            margin-bottom: 4px;
            flex-shrink: 0;
            /* Prevent squishing */
        }

        .card-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 10px;
            white-space: normal;
            line-height: 1.3;
            border-bottom: 2px solid var(--secondary-color);
            padding-bottom: 8px;
        }

        .card-info {
            font-size: 0.95rem;
            color: var(--text-muted);
            min-width: 80px;
        }

        .card-value {
            font-size: 1.05rem;
            color: var(--text-color);
            font-weight: 500;
            white-space: normal;
            text-align: right;
            /* No overflow hiding here, wrapped text will show on expansion */
        }

        /* Modal Styling */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--modal-overlay);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background-color: var(--modal-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            width: 70%;
            max-width: 800px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7);
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-header {
            padding: 20px 25px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.03);
        }

        .modal-title {
            font-size: 1.5rem;
            color: var(--primary-color);
            font-weight: 600;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 2rem;
            cursor: pointer;
            line-height: 1;
            padding: 0;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: #fff;
        }

        .modal-body {
            padding: 30px;
            overflow-y: auto;
            font-size: 1.2rem;
            line-height: 1.6;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }

        ::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #666;
        }

        .empty-state {
            padding: 40px;
            text-align: center;
            color: var(--text-muted);
            grid-column: 1 / -1;
            font-size: 1.2rem;
        }

        /* Responsive adjustments */
        @media (max-width: 1600px) {
            .card-container {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (max-width: 1200px) {
            .card-container {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 900px) {
            .card-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .card-container {
                grid-template-columns: 1fr;
            }
        }

        .filter-panel {
            background-color: var(--surface-color);
            border-radius: 8px;
            padding: 8px 15px;
            /* Reduced vertical padding */
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: nowrap;
            overflow-x: auto;
            flex-shrink: 0;
            flex-direction: row;
            /* FORCE ROW */
        }

        .filter-group {
            display: flex;
            flex-direction: row;
            /* Horizontal: Label -> Input */
            align-items: center;
            /* Center vertically */
            gap: 10px;
            flex: 0 0 auto;
            /* Don't stretch */
        }

        .filter-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 600;
            white-space: nowrap;
            /* Keep label on one line */
        }

        .filter-input,
        .filter-select {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 6px 10px;
            color: var(--text-color);
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
            width: 180px;
        }

        /* View Toggle Styling */
        .view-toggle {
            display: flex;
            background-color: var(--bg-color);
            border-radius: 6px;
            padding: 4px;
            border: 1px solid var(--border-color);
            margin-left: auto;
            /* Push to the right */
        }

        .toggle-option {
            display: none;
        }

        .toggle-label {
            padding: 6px 12px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .toggle-option:checked+.toggle-label {
            background-color: var(--primary-color);
            color: #000;
        }

        /* List View Tables/Rows */
        .list-container {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        .list-header {
            background-color: rgba(255, 255, 255, 0.03);
            border-bottom: 2px solid var(--border-color);
            text-align: left;
        }

        .list-header th {
            padding: 12px 15px;
            color: var(--primary-color);
            font-weight: 600;
        }

        .list-row {
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .list-row:hover {
            background-color: var(--hover-color);
        }

        .list-row td {
            padding: 10px 15px;
            color: var(--text-color);
        }

        .list-row.service-kunde td:first-child {
            color: #81c784;
            font-weight: bold;
        }

        .list-row.has-debt td {
            color: #ef5350 !important;
            font-weight: 500;
        }

        /* Excel-like Filtering and Sorting Styling */
        .list-header th {
            position: relative;
            cursor: pointer;
            user-select: none;
            padding-right: 30px !important;
        }

        .list-header th:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .header-controls {
            position: absolute;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .sort-icon {
            font-size: 0.7rem;
            opacity: 0.3;
        }

        .sort-icon.active {
            opacity: 1;
            color: var(--secondary-color);
        }

        .filter-icon {
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: background 0.2s;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .filter-icon:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--text-color);
        }

        .filter-icon.active {
            color: var(--secondary-color);
        }

        /* Filter Dropdown */
        .column-filter-dropdown {
            position: fixed;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            z-index: 3000;
            min-width: 180px;
            max-height: 300px;
            display: none;
            flex-direction: column;
            overflow: hidden;
            animation: slideDown 0.15s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .filter-search {
            padding: 8px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.2);
        }

        .filter-search input {
            width: 100%;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            box-sizing: border-box;
        }

        .filter-options {
            overflow-y: auto;
            flex: 1;
            padding: 5px 0;
        }

        .filter-option {
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s;
        }

        .filter-option:hover {
            background-color: var(--hover-color);
        }

        .filter-option input {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .filter-actions {
            padding: 8px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.2);
        }

        .filter-btn {
            background: none;
            border: none;
            color: var(--primary-color);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* Tabs Styling */
        .tabs-container {
            display: flex;
            gap: 10px;
            margin-bottom: -1px;
            /* Overlap border if needed */
            padding: 0 10px;
            flex-shrink: 0;
        }

        .tab-item {
            padding: 10px 25px;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-bottom: none;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            color: var(--text-muted);
            font-weight: 600;
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        .tab-item:hover {
            color: var(--text-color);
            background-color: var(--hover-color);
        }

        .tab-item.active {
            background-color: var(--primary-color);
            color: #000;
            border-color: var(--primary-color);
        }
    </style>
</head>

<body>

    <div class="dashboard-container">

        <!-- Filter Panel -->
        <div class="panel filter-panel">

            <div class="filter-group">
                <button id="btnResetFilters" class="filter-btn"
                    style="background-color: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-color); padding: 6px 12px;"
                    onclick="resetAllFilters()">Clear All Filters</button>
            </div>

            <div class="filter-group">
                <label class="filter-label">KundenNr</label>
                <input type="text" id="filterKundenNr" class="filter-input" placeholder="Type to filter...">
            </div>

            <div class="filter-group">
                <label class="filter-label">KundenKategorie</label>
                <select id="filterKundenKategorie" class="filter-select">
                    <option value="">All</option>
                </select>
            </div>

            <div class="filter-group">
                <label class="filter-label" style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" id="filterElster" style="width: 18px; height: 18px; cursor: pointer;">
                    Elster
                </label>
            </div>

            <div class="filter-group">
                <label class="filter-label">BorcTarihiGunSayisi &ge;</label>
                <input type="number" id="filterGunSayisi" class="filter-input" placeholder="Min days..."
                    style="width: 100px;">
            </div>

            <div class="view-toggle">
                <input type="radio" id="viewCard" name="viewMode" value="cardgrid" class="toggle-option">
                <label for="viewCard" class="toggle-label">Card Grid</label>

                <input type="radio" id="viewList" name="viewMode" value="listgrid" class="toggle-option" checked>
                <label for="viewList" class="toggle-label">List Grid</label>
            </div>

            <div id="recordCount"
                style="margin-left: 20px; font-size: 0.9rem; color: var(--primary-color); font-weight: 600; white-space: nowrap;">
                Result: 0
            </div>
        </div>

        <!-- Tab Selection -->
        <div class="tabs-container">
            <div id="tabRental" class="tab-item" onclick="switchTab('rental')">Takipteki Müşteriler</div>
            <div id="tabCustom" class="tab-item active" onclick="switchTab('custom')">Tüm Müşteriler</div>
        </div>

        <!-- Customer List Container -->
        <div class="panel list-panel">
            <div id="cardContainer" class="card-container-wrapper">
                <!-- Data will be populated dynamically (Cards or List) -->
            </div>
        </div>
    </div>

    <!-- Modal Structure -->
    <div id="detailModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Customer Details</div>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalBody" class="modal-body">
                Loading...
            </div>
        </div>
    </div>

    <!-- Column Filter Dropdown Template -->
    <div id="columnFilterDropdown" class="column-filter-dropdown">
        <div class="filter-search">
            <input type="text" id="filterSearchInput" placeholder="Search values...">
        </div>
        <div id="filterOptions" class="filter-options">
            <!-- Checkboxes will be here -->
        </div>
        <div class="filter-actions">
            <button class="filter-btn" onclick="clearColumnFilter()">Clear</button>
            <button class="filter-btn" onclick="closeColumnFilter()">Close</button>
        </div>
    </div>

    <script>
        let refreshInterval;
        const REFRESH_RATE = 60000; // 60 seconds
        const modal = document.getElementById('detailModal');
        const modalBody = document.getElementById('modalBody');

        // Global Data Store
        let datasets = {
            rental: [],
            custom: []
        };
        let currentTab = 'custom';
        let currentViewMode = 'listgrid';

        // Excel-like Grid State
        let columnFilters = {}; // { columnName: [selectedValues] }
        let currentSort = { column: 'KundenNr', direction: 'desc' }; // { column: 'KundenNr', direction: 'asc'|'desc' }
        let activeFilterColumn = null;

        // Fetch Data
        async function fetchAllData() {
            await Promise.all([
                fetchData('rental', '/api/customers'),
                fetchData('custom', '/api/customers_custom')
            ]);
            populateFilterOptions();
            applyFilters();
        }

        async function fetchData(key, url) {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();

                // Format dates
                data.forEach(row => {
                    if (row['BorcTarihi']) {
                        const d = new Date(row['BorcTarihi']);
                        if (!isNaN(d)) {
                            row[`_BorcTarihi_Sort`] = d.getTime();
                            const dd = String(d.getDate()).padStart(2, '0');
                            const mm = String(d.getMonth() + 1).padStart(2, '0');
                            const yyyy = d.getFullYear();
                            row['BorcTarihi'] = `${dd}-${mm}-${yyyy}`;
                        }
                    }
                });

                datasets[key] = data;
            } catch (error) {
                console.error(`Error fetching ${key}:`, error);
            }
        }

        function switchTab(tab) {
            currentTab = tab;

            // Update UI
            document.getElementById('tabRental').classList.toggle('active', tab === 'rental');
            document.getElementById('tabCustom').classList.toggle('active', tab === 'custom');

            applyFilters();
        }

        async function fetchDetails(id) {
            modalBody.innerHTML = "Loading...";
            try {
                const response = await fetch(`/api/details/${id}`);
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                renderDetailsInModal(data);
            } catch (error) {
                console.error('Error fetching details:', error);
                modalBody.innerHTML = "Error loading details";
            }
        }

        function renderDetailsInModal(data) {
            if (data.error) {
                modalBody.innerHTML = data.error;
                return;
            }

            if (!Array.isArray(data) || data.length === 0) {
                modalBody.innerHTML = "No details found";
                return;
            }

            let combinedHtml = '';
            data.forEach((record) => {
                if (record.Detay) {
                    combinedHtml += record.Detay + '<br><hr style="border-color:rgba(255,255,255,0.1); margin:15px 0;">';
                } else {
                    const parts = [];
                    for (const [key, value] of Object.entries(record)) {
                        if (key !== 'kKunde') parts.push(`<strong>${key}:</strong> ${value}`);
                    }
                    combinedHtml += parts.join(' | ') + '<br><hr style="border-color:rgba(255,255,255,0.1); margin:15px 0;">';
                }
            });
            modalBody.innerHTML = combinedHtml;
        }

        // Modal Logic
        function openModal(customerId, customerName) {
            modal.style.display = 'flex';
            document.querySelector('.modal-title').textContent = `${customerName || 'Müşteri'} Detay`;
            fetchDetails(customerId);
        }

        window.closeModal = function () {
            modal.style.display = 'none';
        }

        window.onclick = function (event) {
            if (event.target == modal) {
                closeModal();
            }
        }

        // Filter Logic
        const filterKundenNr = document.getElementById('filterKundenNr');
        const filterKundenKategorie = document.getElementById('filterKundenKategorie');
        const filterElster = document.getElementById('filterElster');
        const filterGunSayisi = document.getElementById('filterGunSayisi');
        const viewToggles = document.getElementsByName('viewMode');

        function populateFilterOptions() {
            const populate = (selectId, key) => {
                const select = document.getElementById(selectId);
                const currentVal = select.value;

                // Combine unique values from all datasets for consistent filters
                const allValues = [
                    ...datasets.rental.map(c => c[key]),
                    ...datasets.custom.map(c => c[key])
                ];
                const uniqueValues = [...new Set(allValues.filter(v => v))].sort();

                select.innerHTML = '<option value="">All</option>';
                uniqueValues.forEach(val => {
                    const opt = document.createElement('option');
                    opt.value = val;
                    opt.textContent = val;
                    select.appendChild(opt);
                });

                if (uniqueValues.includes(currentVal)) {
                    select.value = currentVal;
                }
            };
            populate('filterKundenKategorie', 'KundenKategorie');
        }

        function applyFilters() {
            const kundenNrVal = filterKundenNr.value.trim().toLowerCase();
            const kundenKategorieVal = filterKundenKategorie.value;
            const elsterOnly = filterElster.checked;
            const minGunSayisi = filterGunSayisi.value ? parseInt(filterGunSayisi.value, 10) : null;

            const currentData = datasets[currentTab] || [];

            let filtered = currentData.filter(row => {
                const nr = row['KundenNr'] ? String(row['KundenNr']).toLowerCase() : '';
                if (kundenNrVal && !nr.includes(kundenNrVal)) return false;
                if (kundenKategorieVal && row['KundenKategorie'] != kundenKategorieVal) return false;

                // Elster Filter: Only if checked, filter for Elster == 1
                if (elsterOnly && row['Elster'] != 1) return false;

                // BorcTarihiGunSayisi Global Numeric Filter (gte)
                if (minGunSayisi !== null && !isNaN(minGunSayisi)) {
                    const rowGunSayisi = row['BorcTarihiGunSayisi'] !== null && row['BorcTarihiGunSayisi'] !== undefined ? parseInt(row['BorcTarihiGunSayisi'], 10) : null;
                    if (rowGunSayisi === null || isNaN(rowGunSayisi) || rowGunSayisi < minGunSayisi) {
                        return false;
                    }
                }

                // Column-specific Checkbox Filters
                for (const [col, selectedValues] of Object.entries(columnFilters)) {
                    if (selectedValues.length > 0) {
                        const cellValue = String(row[col] !== null ? row[col] : '-');
                        if (!selectedValues.includes(cellValue)) return false;
                    }
                }

                return true;
            });

            // Sorting
            if (currentSort.column && currentSort.direction) {
                filtered.sort((a, b) => {
                    let valA = a[`_${currentSort.column}_Sort`] !== undefined ? a[`_${currentSort.column}_Sort`] : a[currentSort.column];
                    let valB = b[`_${currentSort.column}_Sort`] !== undefined ? b[`_${currentSort.column}_Sort`] : b[currentSort.column];

                    if (valA === null) valA = '';
                    if (valB === null) valB = '';

                    if (typeof valA === 'string') valA = valA.toLowerCase();
                    if (typeof valB === 'string') valB = valB.toLowerCase();

                    if (valA < valB) return currentSort.direction === 'asc' ? -1 : 1;
                    if (valA > valB) return currentSort.direction === 'asc' ? 1 : -1;
                    return 0;
                });
            }

            // Update record count
            document.getElementById('recordCount').textContent = `Result: ${filtered.length}`;

            if (currentViewMode === 'cardgrid') {
                renderCards(filtered);
            } else {
                renderList(filtered);
            }
        }

        // Event Listeners
        filterKundenNr.addEventListener('input', applyFilters);
        filterKundenKategorie.addEventListener('change', applyFilters);
        filterElster.addEventListener('change', applyFilters);
        filterGunSayisi.addEventListener('input', applyFilters);
        filterElster.addEventListener('change', applyFilters);

        viewToggles.forEach(toggle => {
            toggle.addEventListener('change', (e) => {
                currentViewMode = e.target.value;
                const container = document.getElementById('cardContainer');
                if (currentViewMode === 'listgrid') {
                    container.classList.remove('card-container');
                } else {
                    container.classList.add('card-container');
                }
                applyFilters();
            });
        });

        // Render Functions
        function getDisplayKeys(dataRow) {
            if (currentTab === 'custom') {
                return ['KundenNr', 'Firma', 'KundenKategorie', 'KundenGruppe', 'KasaSayisi', 'SeriKodluKasaSayisi', 'ElsterSayisi', 'BorcToplami', 'BorcTarihi', 'BorcTarihiGunSayisi'];
            }
            // For rental tab, use specific ordering and exclude Tel/Mobil
            return ['KundenNr', 'Firma', 'InhabeName', 'KundenGruppe', 'KundenKategorie', 'PLZ', 'Strasse', 'AnyDesk'];
        }

        function renderCards(data) {
            const container = document.getElementById('cardContainer');
            container.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = '<div class="empty-state">No customers found</div>';
                return;
            }

            const sample = data[0];
            const keys = getDisplayKeys(sample);

            // For Card Title, we search for a "Name" field in the discovered keys
            let titleKey = keys.find(k => /ad|name|firma|unvan|customer/i.test(k));
            if (!titleKey && keys.length > 0) titleKey = keys[0];

            data.forEach(row => {
                const wrapper = document.createElement('div');
                wrapper.className = 'card-placeholder';

                const card = document.createElement('div');
                card.className = 'customer-card';

                if (row['KundenGruppe'] === 'Servicekunde') {
                    card.classList.add('service-kunde');
                }

                let borcAmountStr = String(row['BorcToplami'] || '0').replace(',', '.');
                let borcAmount = parseFloat(borcAmountStr);

                // Cross-reference Master dataset if no direct debt value
                if (isNaN(borcAmount) || borcAmount === 0) {
                    const masterMatch = datasets.custom.find(c => c['KundenNr'] === row['KundenNr']);
                    if (masterMatch) {
                        const mBorc = parseFloat(String(masterMatch['BorcToplami'] || '0').replace(',', '.'));
                        if (!isNaN(mBorc)) {
                            borcAmount = mBorc;
                        }
                    }
                }

                if (!isNaN(borcAmount) && borcAmount > 0) {
                    card.classList.add('has-debt');
                }

                const firmaName = row[titleKey] || '(No Name)';
                const kundenNr = row['KundenNr'] || '';
                const displayTitle = kundenNr ? `${kundenNr} - ${firmaName}` : firmaName;

                card.onclick = () => openModal(row.kKunde, displayTitle);

                if (titleKey) {
                    const title = document.createElement('div');
                    title.className = 'card-title';
                    title.textContent = displayTitle;
                    title.title = displayTitle;
                    card.appendChild(title);
                }

                const infoContainer = document.createElement('div');
                infoContainer.style.display = 'flex';
                infoContainer.style.flexDirection = 'column';
                infoContainer.style.gap = '4px';

                keys.forEach(key => {
                    if (key === titleKey || key === 'KundenNr') return;
                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'card-row';
                    const label = document.createElement('span');
                    label.className = 'card-info';
                    label.textContent = key;
                    const val = document.createElement('span');
                    val.className = 'card-value';

                    let value = row[key] !== null ? row[key] : '-';
                    // Elster specific formatting
                    if (key === 'Elster') {
                        value = row[key] == 1 ? 'Var' : 'Yok';
                    }

                    val.textContent = value;
                    rowDiv.appendChild(label);
                    rowDiv.appendChild(val);
                    infoContainer.appendChild(rowDiv);
                });
                card.appendChild(infoContainer);
                wrapper.appendChild(card);
                container.appendChild(wrapper);
            });
        }

        function renderList(data) {
            const container = document.getElementById('cardContainer');
            container.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = '<div class="empty-state">No customers found</div>';
                return;
            }

            const table = document.createElement('table');
            table.className = 'list-container';

            // Header
            const sample = data[0];
            const keys = getDisplayKeys(sample);

            // Header
            const thead = document.createElement('thead');
            thead.className = 'list-header';
            const headerRow = document.createElement('tr');

            // Column Order
            const finalKeys = keys;

            finalKeys.forEach(key => {
                const th = document.createElement('th');
                th.textContent = key;

                // Add header controls container
                const controls = document.createElement('div');
                controls.className = 'header-controls';

                // Sort Icon
                const sortIcon = document.createElement('span');
                sortIcon.className = 'sort-icon';
                sortIcon.innerHTML = '&#9650;'; // Up arrow
                if (currentSort.column === key) {
                    sortIcon.classList.add('active');
                    if (currentSort.direction === 'desc') sortIcon.innerHTML = '&#9660;'; // Down arrow
                }
                controls.appendChild(sortIcon);

                // Filter Icon
                const filterIcon = document.createElement('span');
                filterIcon.className = 'filter-icon';
                filterIcon.innerHTML = '&#9662;'; // Down caret
                if (columnFilters[key] && columnFilters[key].length > 0) {
                    filterIcon.classList.add('active');
                }
                filterIcon.onclick = (e) => {
                    e.stopPropagation();
                    toggleFilterDropdown(key, filterIcon);
                };
                controls.appendChild(filterIcon);

                th.appendChild(controls);

                // Sorting Handler on Header Click
                th.onclick = () => handleSort(key);

                headerRow.appendChild(th);
            });
            thead.appendChild(headerRow);
            table.appendChild(thead);

            // Body
            const tbody = document.createElement('tbody');
            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = 'list-row';
                if (row['KundenGruppe'] === 'Servicekunde') {
                    tr.classList.add('service-kunde');
                }

                let borcAmountStr = String(row['BorcToplami'] || '0').replace(',', '.');
                let borcAmount = parseFloat(borcAmountStr);

                // Cross-reference Master dataset if no direct debt value
                if (isNaN(borcAmount) || borcAmount === 0) {
                    const masterMatch = datasets.custom.find(c => c['KundenNr'] === row['KundenNr']);
                    if (masterMatch) {
                        const mBorc = parseFloat(String(masterMatch['BorcToplami'] || '0').replace(',', '.'));
                        if (!isNaN(mBorc)) {
                            borcAmount = mBorc;
                        }
                    }
                }

                if (!isNaN(borcAmount) && borcAmount > 0) {
                    tr.classList.add('has-debt');
                }

                const displayTitle = `${row['KundenNr'] || ''} - ${row['Firma'] || ''}`;
                tr.onclick = () => openModal(row.kKunde, displayTitle);

                finalKeys.forEach(key => {
                    const td = document.createElement('td');
                    let value = row[key] !== null ? row[key] : '-';
                    // Elster specific formatting
                    if (key === 'Elster') {
                        value = row[key] == 1 ? 'Var' : 'Yok';
                    }
                    td.textContent = value;
                    if (key === 'BorcToplami') {
                        td.style.textAlign = 'right';
                    }
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
            table.appendChild(tbody);
            container.appendChild(table);
        }

        // New Excel Grid Functions
        function handleSort(column) {
            if (currentSort.column === column) {
                if (currentSort.direction === 'asc') currentSort.direction = 'desc';
                else if (currentSort.direction === 'desc') {
                    currentSort.column = null;
                    currentSort.direction = null;
                }
            } else {
                currentSort.column = column;
                currentSort.direction = 'asc';
            }
            applyFilters();
        }

        function toggleFilterDropdown(column, iconElement) {
            const dropdown = document.getElementById('columnFilterDropdown');
            if (activeFilterColumn === column && dropdown.style.display === 'flex') {
                closeColumnFilter();
                return;
            }

            activeFilterColumn = column;
            const rect = iconElement.getBoundingClientRect();

            dropdown.style.left = `${rect.left - 150}px`;
            dropdown.style.top = `${rect.bottom + 5}px`;
            dropdown.style.display = 'flex';

            renderFilterOptions(column);

            // Focus search input
            document.getElementById('filterSearchInput').value = '';
            setTimeout(() => document.getElementById('filterSearchInput').focus(), 50);
        }

        function renderFilterOptions(column) {
            const container = document.getElementById('filterOptions');
            container.innerHTML = '';

            const currentData = datasets[currentTab] || [];
            const uniqueValues = [...new Set(currentData.map(row => String(row[column] !== null ? row[column] : '-')))].sort();

            const selected = columnFilters[column] || [];

            uniqueValues.forEach(val => {
                const opt = document.createElement('div');
                opt.className = 'filter-option';

                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.checked = selected.includes(val);
                cb.onchange = () => toggleOption(column, val, cb.checked);

                const label = document.createElement('span');
                label.textContent = val;

                opt.appendChild(cb);
                opt.appendChild(label);
                opt.onclick = (e) => {
                    if (e.target !== cb) {
                        cb.checked = !cb.checked;
                        toggleOption(column, val, cb.checked);
                    }
                };
                container.appendChild(opt);
            });
        }

        function toggleOption(column, value, isChecked) {
            if (!columnFilters[column]) columnFilters[column] = [];

            if (isChecked) {
                if (!columnFilters[column].includes(value)) columnFilters[column].push(value);
            } else {
                columnFilters[column] = columnFilters[column].filter(v => v !== value);
            }
            applyFilters();
        }

        function clearColumnFilter() {
            if (activeFilterColumn) {
                columnFilters[activeFilterColumn] = [];
                applyFilters();
                renderFilterOptions(activeFilterColumn);
            }
        }

        function resetAllFilters() {
            // Reset global inputs
            document.getElementById('filterKundenNr').value = '';
            document.getElementById('filterKundenKategorie').value = '';
            document.getElementById('filterElster').checked = false;
            document.getElementById('filterGunSayisi').value = '';

            // Reset Excel-style states
            columnFilters = {};
            currentSort = { column: 'KundenNr', direction: 'desc' };

            // Optional: You could update UI for columnFilterDropdown if it's currently open
            closeColumnFilter();

            // Reapply constraints
            applyFilters();
        }

        function closeColumnFilter() {
            document.getElementById('columnFilterDropdown').style.display = 'none';
            activeFilterColumn = null;
        }

        // Filter search input logic
        document.getElementById('filterSearchInput').addEventListener('input', (e) => {
            const search = e.target.value.toLowerCase();
            const options = document.querySelectorAll('.filter-option');
            options.forEach(opt => {
                const text = opt.textContent.toLowerCase();
                opt.style.display = text.includes(search) ? 'flex' : 'none';
            });
        });

        // Close dropdown when clicking outside
        window.addEventListener('click', (e) => {
            const dropdown = document.getElementById('columnFilterDropdown');
            if (dropdown.style.display === 'flex' &&
                !dropdown.contains(e.target) &&
                !e.target.classList.contains('filter-icon')) {
                closeColumnFilter();
            }
        });

        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(fetchAllData, REFRESH_RATE);
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchAllData();
            startAutoRefresh();
        });
    </script>
</body>

</html>
